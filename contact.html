<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Me</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: #0b1b2b;
            color: #fff;
        }

        .details-container {
            max-width: 600px;
            margin: auto;
            padding: 30px;
        }

        h1 {
            text-align: center;
        }

        .section {
            margin-top: 30px;
            background: #13263a;
            padding: 20px;
            border-radius: 10px;
        }

        label {
            display: block;
            margin-top: 10px;
            font-size: 14px;
        }

        input,
        textarea {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
            border-radius: 6px;
            border: none;
        }

        button {
            margin-top: 15px;
            width: 100%;
            padding: 12px;
            background: #25D366;
            border: none;
            color: white;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
        }

        .info-section {
            margin-top: 20px;
            background: #13263a;
            padding: 20px;
            border-radius: 10px;
        }

        .contact-box p {
            margin: 8px 0;
            font-size: 14px;
        }

        .back-home {
            display: inline-block;
            margin-bottom: 20px;
            padding: 10px 15px;
            background: #ffd700;
            color: #000;
            text-decoration: none;
            border-radius: 6px;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <div class="details-container">

        <!-- Back Button -->
        <a href="index.html" class="back-home">🏠 Back to Home Page</a>

        <h1>🏡 CONTACT US</h1>

        <!-- Contact Form -->
        <div class="section" id="contact">
            <h2>Send a Message</h2>

            <form action="https://formspree.io/f/mblypqvn" method="POST">

                <label for="name">Full Name</label>
                <input type="text" id="name" name="name" placeholder="Enter your full name" required>

                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" placeholder="Enter your email" required>

                <label for="message">Message</label>
                <textarea id="message" name="message" rows="5" placeholder="Type your message here..."
                    required></textarea>

                <button type="submit">📩 Send Message</button>

            </form>
        </div>

        <!-- Contact Info -->
        <div class="info-section">
            <h3>📞 Contact Details</h3>
            <div class="contact-box">
                <p><strong>Phone:</strong> Smart/WhatsApp: 0939 120 9602</p>
                <p><strong>Phone:</strong> Globe: 0917 697 9508</p>
                <p><strong>Facebook:</strong> Rico Gojar Gidoc (Property Consultant)</p>
                <p><strong>Email:</strong> rgg252010@yahoo.com</p>
            </div>
        </div>
    </div>
<a href="https://api.whatsapp.com/send?phone=639391209602&text=Hello%20I%20am%20interested%20in%20the%20property%20you%20posted.%20Thanks!"
   onclick="window.open(this.href,'_blank'); return false;"
   class="chat-btn">
   💬 Chat with us
</a>

<style>
.chat-btn {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: #25D366;
    color: white;
    padding: 14px 22px;
    border-radius: 50px;
    font-weight: bold;
    text-decoration: none;
    z-index: 99999;
    font-family: Arial, sans-serif;
    box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    transition: 0.3s;
    display: flex;
    align-items: center;
    gap: 8px;
}

.chat-btn:hover {
    background: #1ebe5d;
    transform: scale(1.05);
}
</style>



    
    
</body>

</html>
